app = "soul-imaging-voice-agent"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"
  TIMEZONE = "Australia/Sydney"
  CLINIC_NAME = "Soul Imaging Radiology Clinic"
  AGENT_NAME = "Sarah"
  API_ALLOWED_ORIGINS = "*"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 1024
